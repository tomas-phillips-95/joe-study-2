<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMHNP Study Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PMHNP Study Flashcards</h1>
  </header>

  <main>
    <!-- Deck Selector -->
    <div class="deck-selector">
      <label for="deck-select">Choose a deck:</label>
      <select id="deck-select"></select>
      <button id="shuffle-btn" title="Shuffle cards">&#x1F500; Shuffle</button>
    </div>

    <!-- Score -->
    <div class="score-bar">
      <span id="score-text">0 / 0 correct</span>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="progress-text" id="progress-text"></p>

    <!-- Question Card -->
    <div class="card" id="card">
      <p class="card-question" id="card-question"></p>
      <ul class="card-choices" id="card-choices"></ul>
      <p class="tap-hint" id="tap-hint">Select an answer</p>

      <!-- Feedback (hidden until answered) -->
      <div class="feedback" id="feedback">
        <p class="feedback-result" id="feedback-result"></p>
        <p class="card-explanation" id="card-explanation"></p>
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-buttons">
      <button id="prev-btn">&larr; Previous</button>
      <button id="next-btn">Next &rarr;</button>
    </div>

    <!-- Keyboard hint -->
    <p class="keyboard-hint">Use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> to navigate, <kbd>1</kbd>-<kbd>4</kbd> to choose</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
