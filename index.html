<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <title>PMHNP Study Flashcards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PMHNP Study Flashcards</h1>
    <div class="header-controls">
      <select id="deck-select" aria-label="Choose a deck"></select>
      <button id="shuffle-btn" title="Shuffle cards">&#x1F500;</button>
    </div>
  </header>

  <main id="main">
    <!-- Score + Progress -->
    <div class="status-row">
      <span id="score-text">0 / 0 correct</span>
      <span id="progress-text"></span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Question Card -->
    <div class="card" id="card">
      <p class="card-question" id="card-question"></p>
      <ul class="card-choices" id="card-choices"></ul>
      <p class="tap-hint" id="tap-hint">Tap an answer</p>

      <!-- Feedback (hidden until answered) -->
      <div class="feedback" id="feedback">
        <p class="feedback-result" id="feedback-result"></p>
        <p class="card-explanation" id="card-explanation"></p>
        <button class="continue-btn" id="continue-btn">Next Question &rarr;</button>
      </div>
    </div>
  </main>

  <!-- Fixed bottom navigation -->
  <nav class="bottom-nav" id="bottom-nav">
    <button id="prev-btn" aria-label="Previous card">&larr; Prev</button>
    <span class="nav-position" id="nav-position"></span>
    <button id="next-btn" aria-label="Next card">Next &rarr;</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
